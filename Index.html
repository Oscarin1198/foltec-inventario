<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLTEC - Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--text:#f0f0f0;--accent:#c8f135;--border:#2e2e2e;--red:#ff4444;--yellow:#f5c518;--green:#30d158;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface);}
.logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--accent);margin-bottom:8px;}
.stats{display:flex;gap:20px;font-size:11px;}
.stat-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;margin-top:3px;}
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.nav-tab{padding:10px 16px;cursor:pointer;border:none;background:none;color:#888;font-size:12px;font-weight:500;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;outline:none;font-family:'DM Sans',sans-serif;}
.search:focus{border-color:var(--accent);}
.mat-list{flex:1;overflow-y:auto;padding:6px;}
.mat-list::-webkit-scrollbar{width:3px;}
.mat-list::-webkit-scrollbar-thumb{background:var(--border);}
.mat-item{padding:8px;border-radius:4px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;font-size:11px;transition:all 0.15s;}
.mat-item:hover{background:rgba(255,255,255,0.05);}
.mat-item.active{background:rgba(200,241,53,0.15);border-color:var(--accent);}
.mat-name{font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mat-stock{font-size:10px;color:#888;margin-top:2px;}
.main{flex:1;overflow-y:auto;padding:20px;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border);}
.no-content{display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:14px;}
.card-title{font-family:'DM Mono',monospace;font-size:14px;font-weight:600;margin-bottom:10px;}
.card-stat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:var(--bg);padding:10px;border-radius:4px;border:1px solid var(--border);}
.stat-box-label{font-size:9px;color:#888;text-transform:uppercase;}
.stat-box-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;margin-top:4px;}
.btn{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--accent);color:#0f0f0f;}
.page{display:none;}
.page.active{display:flex;flex:1;flex-direction:column;overflow:hidden;}
.toast{position:fixed;bottom:15px;right:15px;padding:10px 16px;border-radius:4px;font-size:11px;background:var(--green);color:white;z-index:1000;opacity:0;transition:opacity 0.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <div class="logo">FOLTEC / INVENTARIO</div>
  <div class="stats">
    <div class="stat"><span style="color:#888;font-size:9px;text-transform:uppercase;">Valor</span><div class="stat-val" id="stat-valor">$0</div></div>
    <div class="stat"><span style="color:#888;font-size:9px;text-transform:uppercase;">Alertas</span><div class="stat-val" style="color:var(--yellow);" id="stat-alertas">0</div></div>
    <div class="stat"><span style="color:#888;font-size:9px;text-transform:uppercase;">Sin stock</span><div class="stat-val" style="color:var(--red);" id="stat-sin">0</div></div>
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('inv')">Inventario</button>
  <button class="nav-tab" onclick="showPage('prod')">Producción</button>
  <button class="nav-tab" onclick="showPage('hist')">Historial</button>
</div>

<div class="layout">
  <div class="page active" id="page-inv">
    <div class="sidebar">
      <div class="sidebar-top">
        <input class="search" type="text" placeholder="Buscar..." id="search-box" oninput="filterMats()">
      </div>
      <div class="mat-list" id="mat-list"></div>
    </div>
    <div class="main" id="main-detail"><div class="no-content">← Selecciona un material</div></div>
  </div>

  <div class="page" id="page-prod">
    <div class="main" style="max-width:800px;margin:0 auto;width:100%;">
      <div class="card">
        <div class="card-title">Producción (en desarrollo)</div>
        <p style="font-size:11px;color:#888;">Feature próximamente</p>
      </div>
    </div>
  </div>

  <div class="page" id="page-hist">
    <div class="main" style="max-width:800px;margin:0 auto;width:100%;">
      <div class="card">
        <div class="card-title">Historial (en desarrollo)</div>
        <p style="font-size:11px;color:#888;">Feature próximamente</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MATS=[{id:1,p:"ADIKEM 100",f:"REG PH",s:20,c:4.94},{id:2,p:"ALCOHOL ETÍLICO",f:"COALESCENTE",s:63,c:0.97},{id:3,p:"AMARILLO CROMO",f:"PIGMENTO",s:24,c:7.80},{id:4,p:"ARD 775",f:"RESINA",s:57,c:4.00},{id:5,p:"BEATRAF",f:"RESINA",s:71,c:1.00},{id:6,p:"BELCARE EA-220",f:"ESPESANTE",s:0,c:4.00},{id:7,p:"BELCARE PU 40",f:"ESPESANTE",s:6,c:6.90},{id:8,p:"BUTILCELLOSOLVE",f:"COALESCENTE",s:40,c:2.27},{id:9,p:"DEFOCARE 30 C",f:"ANTIESPUMANTE",s:24,c:3.99},{id:10,p:"DISPERCLAIR",f:"ANTIESPUMANTE",s:209,c:1.00},{id:11,p:"ED 50 W",f:"ESPESANTE",s:22,c:7.50},{id:12,p:"ESACOL ED 30 W",f:"ESPESANTE",s:20,c:10.17},{id:13,p:"MEG",f:"COALESCENTE",s:20,c:0.71},{id:14,p:"MOWILITH DM - 771",f:"RESINA",s:18,c:3.77},{id:15,p:"MOWILITH DM 611",f:"RESINA",s:18,c:3.43},{id:16,p:"MOWILITH DM 551",f:"RESINA",s:0,c:2.41},{id:17,p:"NEGRO",f:"PIGMENTO",s:10,c:5.10},{id:18,p:"OMICARB 1",f:"CARGA",s:200,c:0.33},{id:19,p:"OMICARB 1 T",f:"CARGA",s:50,c:0.42},{id:20,p:"OMICARB 10",f:"CARGA",s:150,c:0.14},{id:21,p:"OMICARB 4",f:"CARGA",s:74,c:0.27},{id:22,p:"POLYMER GR-C77D",f:"RESINA",s:171,c:2.55},{id:23,p:"POLYMER PT",f:"RESINA",s:200,c:2.54},{id:24,p:"POLIESPERSE",f:"DISPERSANTE",s:24,c:3.31},{id:25,p:"POLIGLOSS 90",f:"EXTENDER",s:20,c:2.34},{id:26,p:"POLIWETT",f:"HUMECTANTE",s:19,c:8.18},{id:27,p:"PROMOCIDE ID",f:"BIOCIDA",s:17.94,c:3.30},{id:28,p:"PROMOCIDE OI",f:"BIOCIDA",s:0,c:9.64},{id:29,p:"PV BRIGHT 620",f:"CARGA",s:120.5,c:1.14},{id:30,p:"ROJO ESCARLATA",f:"PIGMENTO",s:15,c:8.23},{id:31,p:"ROJO ÓXIDO MICRONIZADO",f:"PIGMENTO",s:25,c:3.70},{id:32,p:"SMARTEX",f:"REG PH",s:3,c:7.56},{id:33,p:"TEXANOL",f:"COALESCENTE",s:0.50,c:3.70},{id:34,p:"TIO 2 NTR - 606",f:"PIGMENTO",s:95,c:3.35},{id:35,p:"TIO2 TI PURE R 706",f:"PIGMENTO",s:64,c:4.00},{id:36,p:"TRIPOLIFOSFATO DE POTASIO",f:"SECUESTRANTE",s:25,c:7.70},{id:37,p:"VISCOLAM 635",f:"ESPESANTE",s:19,c:3.66}];

let sel=null;
let mats=JSON.parse(localStorage.getItem('fmat')||'null')||MATS;

function save(){localStorage.setItem('fmat',JSON.stringify(mats));}
function upStats(){let v=0,a=0,z=0;for(let m of mats){v+=m.s*m.c;if(m.s<=0)z++;else if(m.s<=10)a++;}document.getElementById('stat-valor').textContent='$'+Math.round(v);document.getElementById('stat-alertas').textContent=a;document.getElementById('stat-sin').textContent=z;}
function filterMats(){let q=document.getElementById('search-box').value.toLowerCase();let html='';for(let m of mats){if(m.p.toLowerCase().includes(q)){let col=m.s>0?'var(--green)':'var(--red)';html+=`<div class="mat-item ${sel===m.id?'active':''}" onclick="selMat(${m.id})"><div class="mat-name">${m.p}</div><div class="mat-stock" style="color:${col}">${m.s}kg</div></div>`;}}document.getElementById('mat-list').innerHTML=html;}
function selMat(id){sel=id;let m=mats.find(x=>x.id===id);let html=`<div class="card"><div class="card-title">${m.p}</div><div style="font-size:10px;color:#888;margin-bottom:12px;">${m.f}</div><div class="card-stat"><div class="stat-box"><div class="stat-box-label">Stock</div><div class="stat-box-val">${m.s}</div></div><div class="stat-box"><div class="stat-box-label">Valor</div><div class="stat-box-val">$${(m.s*m.c).toFixed(0)}</div></div></div><button class="btn btn-primary" style="width:100%;" onclick="regMov()">Registrar movimiento</button></div>`;document.getElementById('main-detail').innerHTML=html;filterMats();upStats();}
function regMov(){if(!sel)return;let tipo=prompt('Tipo (uso/compra):');if(!tipo)return;let cant=parseFloat(prompt('Cantidad (kg):'));if(!cant)return;let m=mats.find(x=>x.id===sel);if(tipo==='uso'){if(cant>m.s){alert('Stock insuficiente');return;}m.s-=cant;}else m.s+=cant;save();alert('✓ Movimiento registrado');selMat(sel);}
function showPage(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));let id='page-'+page;document.getElementById(id).classList.add('active');document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');if(page==='inv')filterMats();}
filterMats();upStats();
</script>
</body>
</html>
