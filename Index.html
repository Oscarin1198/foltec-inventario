<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLTEC - Inventario</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f; 
  color: #f0f0f0;
  display: flex;
  flex-direction: column;
}
header {
  background: #1a1a1a;
  border-bottom: 1px solid #2e2e2e;
  padding: 16px 20px;
}
.header-title {
  font-size: 18px;
  font-weight: 600;
  color: #c8f135;
  margin-bottom: 8px;
}
.header-stats {
  display: flex;
  gap: 24px;
  font-size: 11px;
}
.stat-item {
  text-align: left;
}
.stat-val {
  font-size: 16px;
  font-weight: 600;
  margin-top: 4px;
}
.tabs {
  background: #1a1a1a;
  border-bottom: 1px solid #2e2e2e;
  display: flex;
}
.tab-btn {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: #888;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
}
.tab-btn.active {
  color: #c8f135;
  border-bottom: 2px solid #c8f135;
}
.container {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.sidebar {
  width: 280px;
  background: #1a1a1a;
  border-right: 1px solid #2e2e2e;
  display: flex;
  flex-direction: column;
}
.search-box {
  padding: 12px;
  border-bottom: 1px solid #2e2e2e;
}
.search-box input {
  width: 100%;
  background: #0f0f0f;
  border: 1px solid #2e2e2e;
  color: #f0f0f0;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 12px;
  outline: none;
}
.search-box input:focus {
  border-color: #c8f135;
}
.mat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.mat-item {
  padding: 10px;
  margin-bottom: 4px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
}
.mat-item:hover {
  background: rgba(255,255,255,0.05);
}
.mat-item.active {
  background: rgba(200, 241, 53, 0.15);
  border-color: #c8f135;
}
.mat-item-name {
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mat-item-stock {
  color: #888;
  font-size: 10px;
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  background: #0f0f0f;
}
.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #888;
  font-size: 13px;
}
.card {
  background: #1a1a1a;
  border: 1px solid #2e2e2e;
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}
.card-text {
  font-size: 11px;
  color: #888;
  margin-bottom: 12px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.stat-box {
  background: #0f0f0f;
  border: 1px solid #2e2e2e;
  padding: 12px;
  border-radius: 4px;
}
.stat-box-label {
  font-size: 9px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.stat-box-val {
  font-size: 18px;
  font-weight: 600;
}
.btn {
  width: 100%;
  padding: 8px;
  background: #c8f135;
  color: #0f0f0f;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.page { display: none; }
.page.active { display: flex; flex-direction: column; }
</style>
</head>
<body>

<header>
  <div class="header-title">FOLTEC / INVENTARIO</div>
  <div class="header-stats">
    <div class="stat-item">
      <span style="color: #888;">Valor</span>
      <div class="stat-val" id="stat-valor">$0</div>
    </div>
    <div class="stat-item">
      <span style="color: #888;">Alertas</span>
      <div class="stat-val" style="color: #f5c518;" id="stat-alertas">0</div>
    </div>
    <div class="stat-item">
      <span style="color: #888;">Sin stock</span>
      <div class="stat-val" style="color: #ff4444;" id="stat-sin">0</div>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('inv')">Inventario</button>
  <button class="tab-btn" onclick="switchTab('prod')">Producción</button>
  <button class="tab-btn" onclick="switchTab('hist')">Historial</button>
</div>

<div class="container">
  <div class="page active" id="page-inv" style="flex-direction: row;">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="search" placeholder="Buscar..." onkeyup="filterMats()">
      </div>
      <div class="mat-list" id="mat-list"></div>
    </div>
    <div class="content" id="content-inv">
      <div class="empty">← Selecciona un material</div>
    </div>
  </div>

  <div class="page" id="page-prod" style="flex-direction: column;">
    <div class="content">
      <div class="card">
        <div class="card-title">Producción</div>
        <div class="card-text">Feature en desarrollo</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-hist" style="flex-direction: column;">
    <div class="content">
      <div class="card">
        <div class="card-title">Historial</div>
        <div class="card-text">Feature en desarrollo</div>
      </div>
    </div>
  </div>
</div>

<script>
const MATERIALES = [
  {id:1,nombre:"ADIKEM 100",stock:20,costo:4.94},
  {id:2,nombre:"ALCOHOL ETÍLICO",stock:63,costo:0.97},
  {id:3,nombre:"AMARILLO CROMO",stock:24,costo:7.80},
  {id:4,nombre:"ARD 775",stock:57,costo:4.00},
  {id:5,nombre:"BEATRAF",stock:71.4,costo:1.00},
  {id:6,nombre:"BELCARE EA-220",stock:0,costo:4.00},
  {id:7,nombre:"BELCARE PU 40",stock:6,costo:6.90},
  {id:8,nombre:"BUTILCELLOSOLVE",stock:40,costo:2.27},
  {id:9,nombre:"DEFOCARE 30 C",stock:24,costo:3.99},
  {id:10,nombre:"DISPERCLAIR",stock:209,costo:1.00},
  {id:11,nombre:"ED 50 W",stock:22,costo:7.50},
  {id:12,nombre:"ESACOL ED 30 W",stock:20,costo:10.17},
  {id:13,nombre:"MEG",stock:20,costo:0.71},
  {id:14,nombre:"MOWILITH DM - 771",stock:18,costo:3.77},
  {id:15,nombre:"MOWILITH DM 611",stock:18,costo:3.43},
  {id:16,nombre:"MOWILITH DM 551",stock:0,costo:2.41},
  {id:17,nombre:"NEGRO",stock:10,costo:5.10},
  {id:18,nombre:"OMICARB 1",stock:200,costo:0.33},
  {id:19,nombre:"OMICARB 1 T",stock:50,costo:0.42},
  {id:20,nombre:"OMICARB 10",stock:150,costo:0.14},
  {id:21,nombre:"OMICARB 4",stock:74,costo:0.27},
  {id:22,nombre:"POLYMER GR-C77D",stock:171,costo:2.55},
  {id:23,nombre:"POLYMER PT",stock:200,costo:2.54},
  {id:24,nombre:"POLIESPERSE",stock:24,costo:3.31},
  {id:25,nombre:"POLIGLOSS 90",stock:20,costo:2.34},
  {id:26,nombre:"POLIWETT",stock:19,costo:8.18},
  {id:27,nombre:"PROMOCIDE ID",stock:17.94,costo:3.30},
  {id:28,nombre:"PROMOCIDE OI",stock:0,costo:9.64},
  {id:29,nombre:"PV BRIGHT 620",stock:120.5,costo:1.14},
  {id:30,nombre:"ROJO ESCARLATA",stock:15,costo:8.23},
  {id:31,nombre:"ROJO ÓXIDO MICRONIZADO",stock:25,costo:3.70},
  {id:32,nombre:"SMARTEX",stock:3,costo:7.56},
  {id:33,nombre:"TEXANOL",stock:0.5,costo:3.70},
  {id:34,nombre:"TIO 2 NTR - 606",stock:95,costo:3.35},
  {id:35,nombre:"TIO2 TI PURE R 706",stock:64,costo:4.00},
  {id:36,nombre:"TRIPOLIFOSFATO DE POTASIO",stock:25,costo:7.70},
  {id:37,nombre:"VISCOLAM 635",stock:19,costo:3.66}
];

let selectedId = null;

function updateStats() {
  let valor = 0, alertas = 0, sin = 0;
  MATERIALES.forEach(m => {
    valor += m.stock * m.costo;
    if (m.stock <= 0) sin++;
    else if (m.stock <= 10) alertas++;
  });
  document.getElementById('stat-valor').textContent = '$' + Math.round(valor);
  document.getElementById('stat-alertas').textContent = alertas;
  document.getElementById('stat-sin').textContent = sin;
}

function filterMats() {
  let q = document.getElementById('search').value.toLowerCase();
  let html = '';
  MATERIALES.forEach(m => {
    if (m.nombre.toLowerCase().includes(q)) {
      let color = m.stock > 0 ? '#30d158' : '#ff4444';
      html += `
        <div class="mat-item ${selectedId === m.id ? 'active' : ''}" onclick="selectMat(${m.id})">
          <div class="mat-item-name">${m.nombre}</div>
          <div class="mat-item-stock" style="color: ${color};">${m.stock} kg</div>
        </div>
      `;
    }
  });
  document.getElementById('mat-list').innerHTML = html;
}

function selectMat(id) {
  selectedId = id;
  let m = MATERIALES.find(x => x.id === id);
  let valor = m.stock * m.costo;
  let html = `
    <div class="card">
      <div class="card-title">${m.nombre}</div>
      <div class="card-text">Gestionar stock y movimientos</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-box-label">Stock</div>
          <div class="stat-box-val">${m.stock} kg</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Valor</div>
          <div class="stat-box-val">$${Math.round(valor)}</div>
        </div>
      </div>
      <button class="btn" onclick="alert('Feature en desarrollo')">Registrar movimiento</button>
    </div>
  `;
  document.getElementById('content-inv').innerHTML = html;
  filterMats();
}

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// Inicializar
filterMats();
updateStats();
</script>

</body>
</html>
